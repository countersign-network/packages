<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cosign — control plane</title>
    <style>
      :root {
        --bg: #0b0e14; --panel: #141925; --panel2: #1b2230; --line: #2a3344;
        --txt: #e6edf3; --muted: #8b97a7; --green: #3fb950; --red: #f85149;
        --amber: #d29922; --blue: #58a6ff; --purple: #bc8cff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--txt);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
        border-bottom: 1px solid var(--line); background: var(--panel); position: sticky; top: 0; z-index: 5; }
      header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; }
      header h1 span { color: var(--muted); font-weight: 400; }
      .grow { flex: 1; }
      .pill { padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid var(--line); }
      .pill.live { color: var(--green); border-color: var(--green); }
      .pill.frozen { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
      @keyframes pulse { 50% { opacity: .55; } }
      button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--line);
        background: var(--panel2); color: var(--txt); padding: 8px 14px; }
      button:hover { border-color: var(--muted); }
      button.freeze { background: var(--red); border-color: var(--red); color: #fff; font-weight: 700;
        padding: 10px 22px; letter-spacing: .5px; box-shadow: 0 0 0 0 rgba(248,81,73,.5); }
      button.freeze:hover { background: #ff6b63; }
      .wrap { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px 20px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      .panel > h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
        margin: 0; padding: 12px 14px; border-bottom: 1px solid var(--line); }
      .backend { padding: 12px 14px; border-bottom: 1px solid var(--line); }
      .backend:last-child { border-bottom: none; }
      .backend .top { display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
      .dot.ok { background: var(--green); } .dot.bad { background: var(--red); }
      .backend .id { font-weight: 700; }
      .backend .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .stats { display: flex; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
      .stat { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; min-width: 78px; }
      .stat .n { font-size: 20px; font-weight: 700; }
      .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
      .stat.allowed .n { color: var(--green); } .stat.blocked .n { color: var(--red); }
      .stat.freeze .n { color: var(--amber); }
      #banner { margin: 0 14px 12px; padding: 10px 12px; border-radius: 8px; display: none;
        border: 1px solid var(--amber); color: var(--amber); background: rgba(210,153,34,.08); }
      #feed { max-height: calc(100vh - 230px); overflow: auto; }
      .row { display: flex; gap: 10px; padding: 6px 14px; border-bottom: 1px solid #1c2330; white-space: nowrap; }
      .row .ix { color: var(--muted); width: 34px; flex: none; text-align: right; }
      .row .msg { overflow: hidden; text-overflow: ellipsis; }
      .k-action_allowed .msg { color: var(--green); }
      .k-action_blocked .msg { color: var(--red); }
      .k-needs_approval .msg, .k-approval_resolved .msg { color: var(--amber); }
      .k-action_requested .msg { color: var(--muted); }
      .k-policy_applied .msg { color: var(--blue); }
      .k-freeze_requested .msg, .k-freeze_resolved .msg, .k-freeze_result .msg,
      .k-freeze_partial .msg, .k-escalation_revoke_session .msg, .k-still_dangerous .msg { color: var(--purple); }
      .k-error .msg { color: var(--red); }
    </style>
  </head>
  <body>
    <header>
      <h1>COSIGN <span>· cross-vendor agent control plane</span></h1>
      <span id="status" class="pill live">● LIVE</span>
      <span class="grow"></span>
      <button id="verifyBtn">Verify ledger</button>
      <button id="unfreezeBtn">Unfreeze</button>
      <button id="freezeBtn" class="freeze">■ FREEZE ALL</button>
    </header>

    <div class="wrap">
      <section class="panel">
        <h2>Backends &amp; agents</h2>
        <div id="backends"></div>
      </section>

      <section class="panel">
        <h2>Unified ledger — live (hash-chained, append-only)</h2>
        <div class="stats">
          <div class="stat allowed"><div class="n" id="cAllowed">0</div><div class="l">allowed</div></div>
          <div class="stat blocked"><div class="n" id="cBlocked">0</div><div class="l">blocked</div></div>
          <div class="stat freeze"><div class="n" id="cFreeze">0</div><div class="l">freezes</div></div>
          <div class="stat"><div class="n" id="cTotal">0</div><div class="l">entries</div></div>
          <div class="stat"><div class="n" id="cVerified">—</div><div class="l">verified</div></div>
        </div>
        <div id="banner"></div>
        <div id="feed"></div>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let allowed = 0, blocked = 0, freezes = 0, total = 0;

      const usdc = (b) => { try { return (Number(BigInt(b)) / 1e6).toFixed(2) + " USDC"; } catch { return b; } };

      function fmt(e) {
        switch (e.kind) {
          case "policy_applied": return "policy applied → " + e.agentId + " (" + e.policyId + ")";
          case "action_requested": return "→ " + e.agentId + " requests " + usdc(e.action.amount) + " to " + (e.action.counterparty || "?");
          case "action_allowed": return "✓ ALLOWED " + e.agentId + " " + usdc(e.action.amount);
          case "action_blocked": return "✗ BLOCKED " + e.agentId + " " + usdc(e.action.amount) + " — " + e.reason;
          case "needs_approval": return "⏸ NEEDS APPROVAL " + e.agentId + " " + usdc(e.action.amount);
          case "approval_resolved": return "↳ approval " + e.decision.toUpperCase();
          case "freeze_requested": return "FREEZE requested across [" + e.targets.join(", ") + "] — " + e.reason;
          case "freeze_result": return "  freeze " + e.providerId + " (" + e.mode + "): " + e.outcome.toUpperCase() + (e.mechanism ? " via " + e.mechanism : "") + " (" + e.latencyMs + "ms)";
          case "escalation_revoke_session": return "  ↳ ESCALATE revokeSession " + e.providerId + "/" + e.agentId + ": " + e.outcome;
          case "freeze_partial": return "  partial — dangerous [" + e.dangerous.join(", ") + "]";
          case "freeze_resolved": return "FREEZE RESOLVED — all " + e.providerCount + " backends stopped in " + e.windowMs + "ms";
          case "still_dangerous": return "STILL DANGEROUS: " + e.dangerous.map((d) => d.providerId).join(", ");
          case "session_revoked": return "session revoked " + e.agentId;
          case "error": return "! error " + (e.providerId || "") + " " + e.message;
          default: return e.kind;
        }
      }

      function addRow(rec) {
        const e = rec.payload;
        total++; $("cTotal").textContent = total;
        if (e.kind === "action_allowed") $("cAllowed").textContent = ++allowed;
        if (e.kind === "action_blocked") $("cBlocked").textContent = ++blocked;
        if (e.kind === "freeze_requested") $("cFreeze").textContent = ++freezes;
        const div = document.createElement("div");
        div.className = "row k-" + e.kind;
        div.innerHTML = '<span class="ix">#' + rec.index + '</span><span class="msg"></span>';
        div.querySelector(".msg").textContent = fmt(e);
        const feed = $("feed");
        feed.insertBefore(div, feed.firstChild);
        while (feed.childNodes.length > 300) feed.removeChild(feed.lastChild);
      }

      async function loadBackends() {
        const [health, agents] = await Promise.all([
          fetch("/health").then((r) => r.json()),
          fetch("/agents").then((r) => r.json()),
        ]);
        const byProvider = {};
        for (const a of agents.agents) (byProvider[a.providerId] ||= []).push(a);
        $("backends").innerHTML = health.providers
          .map((p) => {
            const agentLine = (byProvider[p.id] || []).map((a) => a.agentId + " · " + a.venue).join("<br>");
            return (
              '<div class="backend"><div class="top"><span class="dot ' + (p.healthy ? "ok" : "bad") + '"></span>' +
              '<span class="id">' + p.id + "</span></div>" +
              '<div class="meta">' + p.mode + (agentLine ? "<br>" + agentLine : "") + "</div></div>"
            );
          })
          .join("");
      }

      async function freeze() {
        const r = await fetch("/freeze", { method: "POST" }).then((x) => x.json());
        $("status").className = "pill frozen"; $("status").textContent = "● FROZEN";
        const b = $("banner");
        b.style.display = "block";
        b.textContent = "FREEZE: all " + r.providers.length + " backends stopped=" + r.allStopped +
          " in " + r.windowMs + "ms (target < 1000ms)";
      }
      async function unfreeze() {
        await fetch("/unfreeze", { method: "POST" });
        $("status").className = "pill live"; $("status").textContent = "● LIVE";
        $("banner").style.display = "none";
      }
      async function verify() {
        const r = await fetch("/ledger").then((x) => x.json());
        $("cVerified").textContent = r.verified ? "✓ INTACT" : "✗ BROKEN";
        $("cVerified").style.color = r.verified ? "var(--green)" : "var(--red)";
      }

      $("freezeBtn").onclick = freeze;
      $("unfreezeBtn").onclick = unfreeze;
      $("verifyBtn").onclick = verify;

      function connect() {
        const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/events");
        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === "ledger_append") addRow(msg.record);
        };
        ws.onclose = () => setTimeout(connect, 1000);
      }

      loadBackends();
      verify();
      connect();
    </script>
  </body>
</html>
