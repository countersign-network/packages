<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Countersign — control plane</title>
    <style>
      :root {
        --bg: #0b0e14; --panel: #141925; --panel2: #1b2230; --line: #2a3344;
        --txt: #e6edf3; --muted: #8b97a7; --green: #3fb950; --red: #f85149;
        --amber: #d29922; --blue: #58a6ff; --purple: #bc8cff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--txt);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
        border-bottom: 1px solid var(--line); background: var(--panel); position: sticky; top: 0; z-index: 5; }
      header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; }
      header h1 span { color: var(--muted); font-weight: 400; }
      .grow { flex: 1; }
      .pill { padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid var(--line); }
      .pill.live { color: var(--green); border-color: var(--green); }
      .pill.frozen { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
      @keyframes pulse { 50% { opacity: .55; } }
      button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--line);
        background: var(--panel2); color: var(--txt); padding: 8px 14px; }
      button:hover { border-color: var(--muted); }
      button.freeze { background: var(--red); border-color: var(--red); color: #fff; font-weight: 700;
        padding: 10px 22px; letter-spacing: .5px; box-shadow: 0 0 0 0 rgba(248,81,73,.5); }
      button.freeze:hover { background: #ff6b63; }
      .wrap { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px 20px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      .panel > h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
        margin: 0; padding: 12px 14px; border-bottom: 1px solid var(--line); }
      .backend { padding: 12px 14px; border-bottom: 1px solid var(--line); }
      .backend:last-child { border-bottom: none; }
      .backend .top { display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
      .dot.ok { background: var(--green); } .dot.bad { background: var(--red); }
      .backend .id { font-weight: 700; }
      .backend .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .stats { display: flex; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
      .stat { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; min-width: 78px; }
      .stat .n { font-size: 20px; font-weight: 700; }
      .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
      .stat.allowed .n { color: var(--green); } .stat.blocked .n { color: var(--red); }
      .stat.freeze .n { color: var(--amber); }
      #banner { margin: 0 14px 12px; padding: 10px 12px; border-radius: 8px; display: none;
        border: 1px solid var(--amber); color: var(--amber); background: rgba(210,153,34,.08); }
      #feed { max-height: calc(100vh - 230px); overflow: auto; }
      .row { display: flex; gap: 10px; padding: 6px 14px; border-bottom: 1px solid #1c2330; white-space: nowrap; }
      .row .ix { color: var(--muted); width: 34px; flex: none; text-align: right; }
      .row .msg { overflow: hidden; text-overflow: ellipsis; }
      .k-action_allowed .msg { color: var(--green); }
      .k-action_blocked .msg { color: var(--red); }
      .k-needs_approval .msg, .k-approval_resolved .msg { color: var(--amber); }
      .k-action_requested .msg { color: var(--muted); }
      .k-policy_applied .msg { color: var(--blue); }
      .k-backend_connected .msg { color: var(--green); font-weight: 700; }
      .k-ledger_anchored .msg { color: var(--purple); font-weight: 700; }
      .k-freeze_requested .msg, .k-freeze_resolved .msg, .k-freeze_result .msg,
      .k-freeze_partial .msg, .k-escalation_revoke_session .msg, .k-still_dangerous .msg { color: var(--purple); }
      .k-error .msg { color: var(--red); }
      .k-anomaly_detected .msg { color: var(--amber); font-weight: 700; }
      .k-needs_approval .msg { color: var(--amber); }
      .k-approval_resolved .msg { color: var(--purple); }
      .col { display: flex; flex-direction: column; gap: 16px; }
      #approvals .empty { padding: 12px 14px; color: var(--muted); }
      .appr { padding: 10px 14px; border-bottom: 1px solid var(--line); }
      .appr:last-child { border-bottom: none; }
      .appr .who { color: var(--amber); }
      .appr .why { color: var(--muted); font-size: 12px; margin: 2px 0 7px; }
      .appr .btns { display: flex; gap: 8px; }
      .appr button { padding: 4px 12px; font-size: 12px; }
      .appr button.ok { border-color: var(--green); color: var(--green); }
      .appr button.no { border-color: var(--red); color: var(--red); }
      /* connect-a-backend (moat demo) */
      .bk { padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
      .bk:last-child { border-bottom: none; }
      .bk .info { flex: 1; min-width: 0; }
      .bk .name { font-weight: 700; }
      .bk .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .bk.on .name::before { content: "● "; color: var(--green); }
      .bk button.conn { border-color: var(--blue); color: var(--blue); white-space: nowrap; }
      .bk button.conn:hover { background: rgba(88,166,255,.12); }
      .bk .on-tag { color: var(--green); font-size: 12px; white-space: nowrap; }
      .moat { margin: 0; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13px; color: var(--muted); }
      .moat b { color: var(--txt); }
      .moat.live { color: var(--green); border-left: 3px solid var(--green); background: rgba(63,185,80,.08); }
      .moat.hint { color: var(--amber); border-left: 3px solid var(--amber); background: rgba(210,153,34,.06); }
    </style>
  </head>
  <body>
    <header>
      <h1>COUNTERSIGN <span>· cross-vendor agent control plane</span></h1>
      <span id="status" class="pill live">● LIVE</span>
      <span class="grow"></span>
      <button id="verifyBtn">Verify ledger</button>
      <button id="unfreezeBtn">Unfreeze</button>
      <button id="freezeBtn" class="freeze">■ FREEZE ALL</button>
    </header>

    <div class="wrap">
      <div class="col">
        <section class="panel">
          <h2>Connect wallet backends</h2>
          <div id="moat" class="moat"></div>
          <div id="backends"></div>
        </section>
        <section class="panel">
          <h2>Pending approvals</h2>
          <div id="approvals"><div class="empty">none</div></div>
        </section>
      </div>

      <section class="panel">
        <h2>Unified ledger — live (hash-chained, append-only)</h2>
        <div class="stats">
          <div class="stat allowed"><div class="n" id="cAllowed">0</div><div class="l">allowed</div></div>
          <div class="stat blocked"><div class="n" id="cBlocked">0</div><div class="l">blocked</div></div>
          <div class="stat freeze"><div class="n" id="cFreeze">0</div><div class="l">freezes</div></div>
          <div class="stat"><div class="n" id="cTotal">0</div><div class="l">entries</div></div>
          <div class="stat"><div class="n" id="cVerified">—</div><div class="l">verified</div></div>
        </div>
        <div id="banner"></div>
        <div id="feed"></div>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let allowed = 0, blocked = 0, freezes = 0, total = 0;

      const usdc = (b) => { try { return (Number(BigInt(b)) / 1e6).toFixed(2) + " USDC"; } catch { return b; } };

      function fmt(e) {
        switch (e.kind) {
          case "policy_applied": return "policy applied → " + e.agentId + " (" + e.policyId + ")";
          case "action_requested": return "→ " + e.agentId + " requests " + usdc(e.action.amount) + " to " + (e.action.counterparty || "?");
          case "action_allowed": return "✓ ALLOWED " + e.agentId + " " + usdc(e.action.amount);
          case "action_blocked": return "✗ BLOCKED " + e.agentId + " " + usdc(e.action.amount) + " — " + e.reason;
          case "needs_approval": return "⏸ NEEDS APPROVAL " + e.agentId + " " + usdc(e.action.amount);
          case "approval_resolved": return "↳ approval " + e.decision.toUpperCase();
          case "freeze_requested": return "FREEZE requested across [" + e.targets.join(", ") + "] — " + e.reason;
          case "freeze_result": return "  freeze " + e.providerId + " (" + e.mode + "): " + e.outcome.toUpperCase() + (e.mechanism ? " via " + e.mechanism : "") + " (" + e.latencyMs + "ms)";
          case "escalation_revoke_session": return "  ↳ ESCALATE revokeSession " + e.providerId + "/" + e.agentId + ": " + e.outcome;
          case "freeze_partial": return "  partial — dangerous [" + e.dangerous.join(", ") + "]";
          case "freeze_resolved": return "FREEZE RESOLVED — all " + e.providerCount + " backends stopped in " + e.windowMs + "ms";
          case "still_dangerous": return "STILL DANGEROUS: " + e.dangerous.map((d) => d.providerId).join(", ");
          case "session_revoked": return "session revoked " + e.agentId;
          case "needs_approval": return "⏸ NEEDS APPROVAL " + e.agentId + " " + usdc(e.action.amount);
          case "approval_resolved": return "↳ approval " + e.decision.toUpperCase();
          case "anomaly_detected": return "⚠ ANOMALY [" + e.rule + "] " + e.agentId + ": " + e.detail;
          case "backend_connected": return "🔌 backend connected — " + e.providerId + " (under one control plane)";
          case "ledger_anchored": return "⚓ COUNTERSIGNED head #" + e.index + " → " + (e.ref ? e.ref.slice(0, 22) + "…" : "external anchor");
          case "error": return "! error " + (e.providerId || "") + " " + e.message;
          default: return e.kind;
        }
      }

      function addRow(rec) {
        const e = rec.payload;
        total++; $("cTotal").textContent = total;
        if (e.kind === "action_allowed") $("cAllowed").textContent = ++allowed;
        if (e.kind === "action_blocked") $("cBlocked").textContent = ++blocked;
        if (e.kind === "freeze_requested") $("cFreeze").textContent = ++freezes;
        const div = document.createElement("div");
        div.className = "row k-" + e.kind;
        const ix = document.createElement("span");
        ix.className = "ix"; ix.textContent = "#" + rec.index;
        const msg = document.createElement("span");
        msg.className = "msg"; msg.textContent = fmt(e); // textContent — payloads carry agent data
        div.append(ix, msg);
        const feed = $("feed");
        feed.insertBefore(div, feed.firstChild);
        while (feed.childNodes.length > 300) feed.removeChild(feed.lastChild);
      }

      function renderMoat(m) {
        const el = $("moat");
        // Build with text nodes + <b> elements (no innerHTML) — uniform with the data-driven renderers.
        const set = (parts) => {
          el.textContent = "";
          for (const p of parts) {
            if (typeof p === "string") el.appendChild(document.createTextNode(p));
            else { const b = document.createElement("b"); b.textContent = p.b; el.appendChild(b); }
          }
        };
        if (m.connectedCount === 0) {
          el.className = "moat hint";
          set(["Connect a backend to begin. The whole thesis: ", { b: "connect a second one" }, " — one policy, one freeze, one ledger across rails no single wallet vendor can span."]);
        } else if (m.multiBackend) {
          el.className = "moat live";
          const t = m.timeToSecondBackendMs != null ? " (2nd connected " + (m.timeToSecondBackendMs / 1000).toFixed(1) + "s after the 1st)" : "";
          set(["✓ ", { b: "Multi-backend control plane live" }, " — " + m.connectedCount + " backends under one freeze" + t + ". This is the moat."]);
        } else {
          el.className = "moat hint";
          set([{ b: "1 backend connected." }, " Now connect a ", { b: "second" }, " — that's the one thing a single wallet vendor can't do for you."]);
        }
      }

      async function loadBackends() {
        const data = await fetch("/backends").then((r) => r.json());
        renderMoat(data.metrics);
        const host = $("backends");
        host.textContent = "";
        for (const b of data.backends) {
          const card = document.createElement("div");
          card.className = "bk" + (b.connected ? " on" : "");
          const info = document.createElement("div");
          info.className = "info";
          const name = document.createElement("div");
          name.className = "name"; name.textContent = b.label;
          const sub = document.createElement("div");
          sub.className = "sub"; sub.textContent = b.mode + " · " + b.blurb;
          info.append(name, sub);
          card.appendChild(info);
          if (b.connected) {
            const tag = document.createElement("span");
            tag.className = "on-tag"; tag.textContent = "connected";
            card.appendChild(tag);
          } else {
            const btn = document.createElement("button");
            btn.className = "conn"; btn.textContent = "+ Connect"; btn.dataset.connect = b.id;
            card.appendChild(btn);
          }
          host.appendChild(card);
        }
      }

      $("backends").addEventListener("click", async (e) => {
        const id = e.target.getAttribute && e.target.getAttribute("data-connect");
        if (!id) return;
        e.target.disabled = true;
        e.target.textContent = "connecting…";
        await fetch("/connect", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ providerId: id }) });
        loadBackends();
      });

      async function freeze() {
        const r = await fetch("/freeze", { method: "POST" }).then((x) => x.json());
        $("status").className = "pill frozen"; $("status").textContent = "● FROZEN";
        const b = $("banner");
        b.style.display = "block";
        b.textContent = "FREEZE: all " + r.providers.length + " backends stopped=" + r.allStopped +
          " in " + r.windowMs + "ms (target < 1000ms)";
        loadBackends();
      }
      async function unfreeze() {
        await fetch("/unfreeze", { method: "POST" });
        $("status").className = "pill live"; $("status").textContent = "● LIVE";
        $("banner").style.display = "none";
      }
      async function verify() {
        const r = await fetch("/ledger").then((x) => x.json());
        $("cVerified").textContent = r.verified ? "✓ INTACT" : "✗ BROKEN";
        $("cVerified").style.color = r.verified ? "var(--green)" : "var(--red)";
      }

      async function loadApprovals() {
        const { approvals } = await fetch("/approvals").then((r) => r.json());
        const el = $("approvals");
        el.textContent = "";
        if (!approvals.length) {
          const empty = document.createElement("div");
          empty.className = "empty"; empty.textContent = "none";
          el.appendChild(empty);
          return;
        }
        for (const a of approvals) {
          const wrap = document.createElement("div");
          wrap.className = "appr";
          const who = document.createElement("div");
          who.className = "who";
          who.textContent = a.agentId + " · " + usdc(a.amount) + " → " + (a.counterparty || "?");
          const why = document.createElement("div");
          why.className = "why"; why.textContent = a.reason; // agent-supplied — textContent, never innerHTML
          const btns = document.createElement("div");
          btns.className = "btns";
          const ok = document.createElement("button");
          ok.className = "ok"; ok.textContent = "Approve"; ok.dataset.ok = a.approvalToken;
          const no = document.createElement("button");
          no.className = "no"; no.textContent = "Deny"; no.dataset.no = a.approvalToken;
          btns.append(ok, no);
          wrap.append(who, why, btns);
          el.appendChild(wrap);
        }
      }
      $("approvals").addEventListener("click", async (e) => {
        const el = e.target;
        const ok = el.getAttribute && el.getAttribute("data-ok");
        const no = el.getAttribute && el.getAttribute("data-no");
        const post = (path, token) => fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ approvalToken: token }) });
        if (ok) await post("/approve", ok);
        else if (no) await post("/deny", no);
        if (ok || no) loadApprovals();
      });

      $("freezeBtn").onclick = freeze;
      $("unfreezeBtn").onclick = unfreeze;
      $("verifyBtn").onclick = verify;

      function connect() {
        const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/events");
        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === "ledger_append") addRow(msg.record);
        };
        ws.onclose = () => setTimeout(connect, 1000);
      }

      loadBackends();
      loadApprovals();
      setInterval(loadApprovals, 3000);
      verify();
      connect();
    </script>
  </body>
</html>
