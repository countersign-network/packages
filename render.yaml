# Countersign Core — Render Blueprint (Infrastructure as Code).
# In Render: New → Blueprint → connect this repo. It provisions an always-on web service + a
# managed Postgres and wires DATABASE_URL between them. Deploys the DEMO Core (mock fleet + live
# activity) — the hosted free-tier playground the dashboard + `countersign-mcp` (COUNTERSIGN_URL) point at.
# For a real deploy serving actual agents: set COUNTERSIGN_DEMO_TRAFFIC=off and wire real adapters.
#
# Verify plan slugs in the Render dashboard before applying — Render's plan names change.

services:
  - type: web
    name: countersign-core
    runtime: docker # builds ./Dockerfile (portable; also works on Fly/Akash/local)
    dockerfilePath: ./Dockerfile
    plan: starter # ALWAYS-ON. The free plan sleeps, and a sleeping control plane can't freeze.
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Render injects PORT and the app binds it (main.ts reads process.env.PORT). Do not hardcode PORT.
      - key: DATABASE_URL
        fromDatabase:
          name: countersign-ledger
          property: connectionString # internal URL (same region) — no public SSL needed
      # "on" = ambient fleet + synthetic traffic; anything else = the interactive CONNECT demo
      # (start empty, operator connects backends). The moat-validation demo runs in connect mode.
      - key: COUNTERSIGN_DEMO_TRAFFIC
        value: "off"
      # API auth. The mock demo can run open, but ANY credential-backed deploy MUST set this — main.ts
      # refuses to boot a Core that has vendor creds with no auth. Format: "key:tenant:role,…".
      # Set as a Render SECRET (sync:false), never commit the value.
      - key: COUNTERSIGN_API_KEYS
        sync: false
      # Stable Ed25519 ledger signing key (base64 PKCS8). Without it the signer is EPHEMERAL — the
      # public key changes every boot and prior rows can't be verified against a stable identity. Set
      # a stable secret for any real (or persistent-demo) deploy so /ledger's published key is durable.
      - key: COUNTERSIGN_LEDGER_KEY
        sync: false

databases:
  - name: countersign-ledger
    plan: free # the signed, hash-chained audit ledger. NOTE: free Postgres is deleted after ~30 days —
    # upgrade to basic-256mb (or higher) for real retention. The live deploy currently runs on free.
    databaseName: countersign
    region: oregon
