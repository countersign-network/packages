name: Release (npm publish + provenance)

# Publishes the open-core front-door packages to npm WITH provenance — a signed,
# verifiable attestation (via GitHub's OIDC) that the tarball was built from this
# repo at this commit. npm shows a "Provenance" badge and the build/source links.
#
# ONE-TIME SETUP (the only manual step): create an npm *Automation* access token for
# the `screan` account (npmjs.com → Access Tokens → Generate → Automation — classic,
# NOT granular: granular tokens 403 on npm's 2FA-publish gate) and add it to this
# repo as a secret named NPM_TOKEN (GitHub → Settings → Secrets and variables →
# Actions → New repository secret).
#
# TO RELEASE: bump the version in the package(s), commit, then push a tag, e.g.
#   git tag v0.1.2 && git push origin v0.1.2
# (or run this workflow manually from the Actions tab). It publishes whatever
# versions are currently in the manifests; npm rejects a version that already exists.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED for npm provenance (OIDC). Without it, --provenance fails.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # publishing uses NPM_TOKEN, not the git credential

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org # writes the token-based .npmrc

      - run: pnpm install --frozen-lockfile

      # Gate: never publish a broken build.
      - run: pnpm typecheck
      - run: pnpm test

      # Publish order matters: sdk depends on api-contract (workspace:^ → ^x.y.z).
      # prepublishOnly builds each package; publishConfig swaps src→dist entry points.
      - name: Publish @countersign/api-contract
        run: pnpm --filter @countersign/api-contract publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/sdk
        run: pnpm --filter @countersign/sdk publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # x402 depends on api-contract; mcp depends on sdk + x402 — publish after both.
      - name: Publish @countersign/x402
        run: pnpm --filter @countersign/x402 publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/mcp
        run: pnpm --filter @countersign/mcp publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
