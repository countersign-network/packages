name: Release (npm publish + provenance)

# Publishes the open-core front-door packages to npm WITH provenance — a signed,
# verifiable attestation (via GitHub's OIDC) that the tarball was built from this
# repo at this commit. npm shows a "Provenance" badge and the build/source links.
#
# ONE-TIME SETUP (the only manual step): create an npm *Automation* access token for
# the `screan` account (npmjs.com → Access Tokens → Generate → Automation — classic,
# NOT granular: granular tokens 403 on npm's 2FA-publish gate) and add it to this
# repo as a secret named NPM_TOKEN (GitHub → Settings → Secrets and variables →
# Actions → New repository secret).
#
# TO RELEASE: bump the version in the package(s), commit, then push a tag, e.g.
#   git tag v0.1.2 && git push origin v0.1.2
# (or run this workflow manually from the Actions tab). It publishes whatever
# versions are currently in the manifests; npm rejects a version that already exists.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED for npm provenance (OIDC). Without it, --provenance fails.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # publishing uses NPM_TOKEN, not the git credential

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org # writes the token-based .npmrc

      - run: pnpm install --frozen-lockfile

      # Gate: never publish a broken build.
      - run: pnpm typecheck
      - run: pnpm test

      # Each step publishes WITH provenance via scripts/publish-pkg.mjs, which SKIPS any package whose
      # current manifest version is already on npm. So a tag only publishes the package(s) you bumped;
      # the already-live ones no-op instead of failing the run. prepublishOnly builds each package;
      # publishConfig swaps src→dist entry points.
      #
      # Order respects runtime deps: api-contract is the contract; sdk/x402/ap2 depend on it
      # (workspace:^ → ^x.y.z); mcp depends on sdk + x402 + ap2 — so mcp is published last.
      - name: Publish @countersign/api-contract
        run: node scripts/publish-pkg.mjs @countersign/api-contract
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/sdk
        run: node scripts/publish-pkg.mjs @countersign/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/x402
        run: node scripts/publish-pkg.mjs @countersign/x402
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/ap2
        run: node scripts/publish-pkg.mjs @countersign/ap2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @countersign/mcp
        run: node scripts/publish-pkg.mjs @countersign/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # List @countersign/mcp in the OFFICIAL MCP Registry (registry.modelcontextprotocol.io) — the
      # canonical index that mcp.so / Glama / PulseMCP and MCP clients ingest from. Auth is GitHub OIDC
      # (no secret): the io.github.countersign-network/* namespace is authorized by this repo's org.
      # Runs AFTER the npm publish so the registry can validate the live package + its mcpName.
      - name: Install mcp-publisher
        run: curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      # The registry rejects a re-publish of an already-listed version with a 400 "duplicate version"
      # (it is NOT a no-op). A coordinated release that bumps the npm packages but not mcp would then
      # red-X here for no real failure — so treat that specific duplicate as success and fail on anything
      # else. (mcp's server.json version tracks packages/mcp/package.json; bump it to actually re-list.)
      - name: Publish to MCP Registry
        run: |
          cd packages/mcp
          out=$("$GITHUB_WORKSPACE/mcp-publisher" publish 2>&1) && { echo "$out"; exit 0; }
          echo "$out"
          if echo "$out" | grep -qi "duplicate version"; then
            echo "::notice::mcp version already listed in the MCP Registry — nothing to re-publish."
            exit 0
          fi
          exit 1
