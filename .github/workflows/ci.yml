name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (strict TS across the workspace)
        run: pnpm typecheck

      - name: Test (policy compiler, hash-chain, fail-closed matrix, <1s freeze SLO, REST+ws, MCP, x402, anomaly)
        run: pnpm test

      - name: Audit production dependencies (fail on high+)
        run: pnpm audit --prod --audit-level high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan full history, not just the latest commit
      # Run the gitleaks CLI directly (Apache/MIT, no license key). The gitleaks-action@v2 wrapper
      # now requires a paid GITLEAKS_LICENSE secret for orgs; the binary does not. Same scan, same
      # auto-discovered .gitleaks.toml, fails the job on any finding.
      - name: gitleaks (CLI)
        run: |
          GL_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --verbose --exit-code 1
