packages:
  - 'packages/*'
  - 'api-contract'
  - 'examples/*'
allowBuilds:
  esbuild: true
# Force patched transitive deps (prod audit gates CI on high+). hono/@hono/node-server arrive via the
# MCP SDK's HTTP transport (never loaded — our MCP server is stdio-only, so they're runtime-inert);
# ws/axios are kept as a safety net for any transitive pull.
overrides:
  ws: '>=8.21.0'
  axios: '>=1.18.1'
  hono: '>=4.12.27'
  '@hono/node-server': '>=2.0.5'
  # dev-only advisories (Dependabot repo badge): vite path-traversal/fs.deny + esbuild dev-server
  vite: '>=6.4.3'
  esbuild: '>=0.28.1'

# client/ is the Flutter app (Dart), not a pnpm workspace member.
